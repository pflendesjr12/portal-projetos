<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="pt-BR">
<title>Portal de Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080d1a; --bg2: #0e1525; --bg3: #131c30;
    --card: #111827; --card2: #1a2438;
    --border: rgba(99,130,201,0.15); --border2: rgba(99,130,201,0.28);
    --accent: #00d2ff; --accent2: #3a7bd5; --accent-glow: rgba(0, 210, 255, 0.15);
    --text: #e8edf7; --text2: #8fa3c8; --text3: #4f6a96;
    --font-h: 'Syne', sans-serif; --font-b: 'DM Sans', sans-serif;
    --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.45);
    --sb-w: 220px; --sb-c: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 14px; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; top: 0; left: 0; height: 100vh; z-index: 200;
    width: var(--sb-c);
    background: rgba(14, 21, 37, 0.8); backdrop-filter: blur(10px); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width 0.25s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar:hover { width: var(--sb-w); }

  .sb-logo {
    height: 60px; display: flex; align-items: center; gap: 12px;
    padding: 0 14px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; cursor: pointer;
  }
  .sb-logo-icon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    background: url('https://raw.githubusercontent.com/pflendesjr12/portal-projetos/main/logo_concept_2.png') no-repeat center;
    background-size: contain;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-logo-text { font-family: var(--font-h); font-size: 14px; font-weight: 700; white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
  .sb-logo-text span { color: var(--accent2); }
  .sidebar:hover .sb-logo-text { opacity: 1; }

  .sb-nav { padding: 8px 0; flex: 1; overflow-y: auto; overflow-x: hidden; }

  .sb-section-label {
    font-size: 9px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 10px 18px 4px; white-space: nowrap;
    opacity: 0; transition: opacity 0.2s;
  }
  .sidebar:hover .sb-section-label { opacity: 1; }

  .sb-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap; color: var(--text3); position: relative;
  }
  .sb-item:hover { background: var(--bg3); color: var(--text2); }
  .sb-item.active { background: var(--accent-glow); color: var(--accent); }
  .sb-item.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .sb-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sb-label { font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
  .sidebar:hover .sb-label { opacity: 1; }

  .sb-footer {
    padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .sb-user {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 2px; border-radius: var(--radius-sm);
  }
  .sb-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: var(--accent-glow); border: 1px solid rgba(79,142,247,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--accent2);
  }
  .sb-user-info { overflow: hidden; opacity: 0; transition: opacity 0.2s; min-width: 0; flex: 1; }
  .sidebar:hover .sb-user-info { opacity: 1; }
  .sb-user-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-user-role { font-size: 10px; color: var(--text3); }
  .sb-logout {
    color: var(--text3); background: none; border: none; cursor: pointer;
    display: flex; padding: 4px; border-radius: 4px; transition: color 0.15s;
    opacity: 0; transition: opacity 0.2s, color 0.15s; flex-shrink: 0;
  }
  .sidebar:hover .sb-logout { opacity: 1; }
  .sb-logout:hover { color: #ef4444; }

  /* ── APP LAYOUT ── */
  .app-wrap {
    margin-left: var(--sb-c);
    transition: margin-left 0.25s cubic-bezier(.4,0,.2,1);
    min-height: 100vh;
  }
  .sidebar:hover ~ .app-wrap { margin-left: var(--sb-w); }

  /* ── TOPBAR ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,13,26,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; gap: 16px;
  }
  .page-title { font-family: var(--font-h); font-size: 16px; font-weight: 700; }
  .header-sep { flex: 1; }
  .header-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 14px;
    width: 220px; transition: border-color 0.2s;
  }
  .header-search:focus-within { border-color: var(--accent); }
  .header-search svg { flex-shrink: 0; opacity: 0.5; }
  .header-search input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-b); font-size: 13px; width: 100%; }
  .header-search input::placeholder { color: var(--text3); }
  .btn-icon {
    width: 36px; height: 36px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--text2);
  }
  .btn-icon:hover { background: var(--card2); border-color: var(--border2); color: var(--text); }
  .btn-primary {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font-b); font-size: 13px; font-weight: 500;
    padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  /* ── MAIN CONTENT ── */
  .main { padding: 28px 28px 80px; max-width: 1400px; margin: 0 auto; }
  .main.hidden { display: none; }

  /* ── KPI CARDS ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .kpi-card { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; transition: all 0.3s ease; }
  .kpi-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0, 210, 255, 0.1); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--kpi-color, var(--accent)); }
  .kpi-card:hover { border-color: var(--border2); }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-h); font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .kpi-sub { font-size: 12px; color: var(--text3); }
  .kpi-icon { position: absolute; right: 16px; top: 16px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--kpi-bg, rgba(79,142,247,0.1)); color: var(--kpi-color, var(--accent)); }

  /* ── FILTERS ── */
  .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-right: 4px; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: var(--font-b); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .view-toggle { margin-left: auto; display: flex; gap: 4px; }

  /* ── PROJECT CARDS ── */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .projects-list { display: flex; flex-direction: column; gap: 10px; }
  .project-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
  .project-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--status-color, var(--accent)), transparent); opacity: 0; transition: opacity 0.2s; }
  .project-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
  .project-card:hover::after { opacity: 1; }
  .project-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .project-name { font-family: var(--font-h); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .project-card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .project-card:hover .project-card-actions { opacity: 1; }
  .card-btn { width: 28px; height: 28px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .card-btn:hover { background: var(--card2); color: var(--text); }
  .card-btn.del:hover { background: rgba(220,60,60,0.1); border-color: rgba(220,60,60,0.3); color: #dc3c3c; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid; white-space: nowrap; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .project-meta { display: flex; flex-direction: column; gap: 7px; margin: 12px 0; }
  .meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  .meta-row svg { flex-shrink: 0; color: var(--text3); }
  .meta-row strong { color: var(--text); font-weight: 500; }
  .devs-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .dev-tag { padding: 2px 8px; border-radius: 4px; background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.18); color: var(--accent2); font-size: 11px; font-weight: 500; }
  .sm-tag { padding: 2px 8px; border-radius: 4px; background: rgba(100,200,140,0.08); border: 1px solid rgba(100,200,140,0.18); color: #64c88c; font-size: 11px; font-weight: 500; }
  .updates-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 12px; font-size: 12px; color: var(--text2); line-height: 1.5; max-height: 72px; overflow: hidden; position: relative; }
  .updates-box::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 20px; background: linear-gradient(transparent, var(--bg2)); }
  .updates-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 500; margin-bottom: 4px; }
  .deadline-warn { color: #f59e0b !important; }
  .deadline-over { color: #ef4444 !important; }
  .list-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.18s; }
  .list-card:hover { border-color: var(--border2); background: var(--card2); }
  .list-name { font-family: var(--font-h); font-size: 14px; font-weight: 600; min-width: 200px; flex: 1; }
  .list-meta { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
  .empty-state { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
  .empty-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty-state h3 { font-family: var(--font-h); font-size: 18px; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; color: var(--text3); }

  /* ── MODALS ── */
  .modal-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal-wide { max-width: 780px; }
  .modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-h); font-size: 18px; font-weight: 700; }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .modal-close:hover { background: var(--card2); color: var(--text); }
  .modal-body { padding: 24px 28px; }
  .modal-footer { padding: 16px 28px 24px; display: flex; align-items: center; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-full { grid-column: 1/-1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .form-label span { color: #ef4444; margin-left: 2px; }
  .form-input, .form-select, .form-textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: var(--font-b); font-size: 13px; outline: none; transition: border-color 0.18s; width: 100%; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--bg2); color: var(--text); }
  .multiselect { position: relative; }
  .multiselect-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; min-height: 38px; transition: border-color 0.18s; }
